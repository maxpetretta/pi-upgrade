name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish To npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm i -g npm@^11.5.1

      - name: Verify tag matches package version
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          package_version="$(node -p "require('./package.json').version")"
          normalized_tag="${tag#v}"

          if [[ "$normalized_tag" != "$package_version" ]]; then
            echo "Release tag ($tag) does not match package version ($package_version)."
            exit 1
          fi

      - name: Publish package to npm
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          npm_tag="latest"
          if [[ "$version" == *-beta.* ]]; then
            npm_tag="beta"
          fi

          npm publish --provenance --tag "$npm_tag" 2>&1 || {
            exit_code=$?
            if npm view "pi-upgrade@$version" version >/dev/null 2>&1; then
              echo "Version already published — continuing."
            else
              exit $exit_code
            fi
          }
